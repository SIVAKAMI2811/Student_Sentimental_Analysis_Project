<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Feedback</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
        --bg: #0F1117;
        --surface: #1A1D27;
        --border: rgba(255,255,255,0.07);
        --border-focus: rgba(139,92,246,0.55);
        --purple: #8B5CF6;
        --purple-soft: rgba(139,92,246,0.12);
        --teal: #2DD4BF;
        --text: #F1F0FF;
        --text-muted: rgba(241,240,255,0.42);
        --text-sub: rgba(241,240,255,0.62);
        --input-bg: rgba(255,255,255,0.04);
    }

    html { scroll-behavior: smooth; }

    body {
        min-height: 100vh;
        background: var(--bg);
        font-family: "Inter", sans-serif;
        color: var(--text);
        overflow-x: hidden;
    }

    /* GLOWS */
    body::before {
        content: "";
        position: fixed; top: -200px; left: 50%;
        transform: translateX(-50%);
        width: 800px; height: 500px;
        background: radial-gradient(ellipse, rgba(139,92,246,0.16) 0%, transparent 65%);
        pointer-events: none; z-index: 0;
    }
    body::after {
        content: "";
        position: fixed; bottom: -150px; right: -100px;
        width: 500px; height: 400px;
        background: radial-gradient(ellipse, rgba(45,212,191,0.1) 0%, transparent 65%);
        pointer-events: none; z-index: 0;
    }

    /* NAVBAR */
    nav {
        width: 100%; height: 64px;
        padding: 0 40px;
        display: flex; justify-content: space-between; align-items: center;
        border-bottom: 1px solid var(--border);
        background: rgba(15,17,23,0.85);
        backdrop-filter: blur(20px);
        position: sticky; top: 0; z-index: 100;
    }

    nav h2 {
        font-size: 14px; font-weight: 600;
        display: flex; align-items: center; gap: 10px;
    }

    nav h2::before {
        content: "🎓";
        width: 32px; height: 32px; border-radius: 8px;
        background: linear-gradient(135deg, var(--purple), var(--teal));
        display: inline-flex; align-items: center; justify-content: center;
        font-size: 15px; flex-shrink: 0;
    }

    nav button {
        display: inline-flex; align-items: center; gap: 7px;
        padding: 8px 18px; border-radius: 8px;
        background: var(--purple-soft);
        border: 1px solid rgba(139,92,246,0.3);
        color: #C4B5FD; font-family: inherit;
        font-size: 13px; font-weight: 600;
        cursor: pointer; transition: all 0.2s;
    }
    nav button:hover {
        background: rgba(139,92,246,0.22);
        border-color: rgba(139,92,246,0.5);
        color: #DDD6FE;
    }

    /* HERO */
    .hero {
        min-height: 88vh;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        text-align: center; padding: 60px 24px;
        position: relative; z-index: 1;
        animation: fadeUp 0.5s ease both;
    }

    .hero h1 {
        font-size: clamp(36px, 7vw, 68px);
        font-weight: 700; letter-spacing: -2px; line-height: 1.1;
        margin-bottom: 18px;
        background: linear-gradient(90deg, #A78BFA, var(--teal));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .hero p {
        font-size: 16px; color: var(--text-sub);
        max-width: 440px; line-height: 1.7; margin-bottom: 32px;
    }

    /* FEEDBACK SECTION */
    .feedback {
        padding: 80px 24px;
        display: flex; flex-direction: column; align-items: center;
        position: relative; z-index: 1;
    }

    .feedback.hidden { display: none; }

    .feedback h2 {
        font-size: clamp(22px, 4vw, 30px);
        font-weight: 700; letter-spacing: -0.4px;
        margin-bottom: 32px; text-align: center;
        background: linear-gradient(90deg, #A78BFA, var(--teal));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    /* FORM CARD */
    form {
        width: min(96%, 660px);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 36px;
    }

    .field { margin-bottom: 20px; }

    .field label {
        display: flex; align-items: center; gap: 7px;
        font-size: 12px; font-weight: 600;
        color: var(--text-sub); text-transform: uppercase;
        letter-spacing: 0.4px; margin-bottom: 8px;
    }

    .field label::before {
        content: "";
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--purple); flex-shrink: 0;
    }

    .field textarea {
        width: 100%;
        padding: 12px 16px;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        font-family: inherit; font-size: 14px;
        line-height: 1.6; resize: vertical; min-height: 88px;
        outline: none; transition: border-color 0.2s, background 0.2s;
    }

    .field textarea::placeholder { color: var(--text-muted); }

    .field textarea:focus {
        border-color: var(--border-focus);
        background: rgba(139,92,246,0.05);
        box-shadow: 0 0 0 3px rgba(139,92,246,0.1);
    }

    form > button[type="submit"] {
        width: 100%; padding: 14px;
        margin-top: 10px;
        border: none; border-radius: 10px;
        background: linear-gradient(135deg, var(--purple), #6D28D9);
        color: white; font-family: inherit;
        font-size: 15px; font-weight: 600;
        cursor: pointer; transition: transform 0.2s;
        position: relative; overflow: hidden;
    }
    form > button[type="submit"]::after {
        content: "";
        position: absolute; inset: 0;
        background: linear-gradient(135deg, var(--teal), var(--purple));
        opacity: 0; transition: opacity 0.35s;
    }
    form > button[type="submit"]:hover::after { opacity: 1; }
    form > button[type="submit"]:hover { transform: translateY(-1px); }

    /* THANK YOU */
    .thankyou {
        min-height: 80vh;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        text-align: center; padding: 60px 24px;
        position: relative; z-index: 1;
        animation: fadeUp 0.5s ease both;
    }

    .thankyou.hidden { display: none; }

    .thankyou h1 {
        font-size: clamp(22px, 4vw, 34px);
        font-weight: 700; letter-spacing: -0.4px;
        background: linear-gradient(90deg, #A78BFA, var(--teal));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
        nav { padding: 0 16px; }
        nav h2 { font-size: 12px; }
        form { padding: 22px 16px; }
    }

    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation: none !important; transition: none !important; }
    }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
    <h2>S.H.N Ethel Harvey Girls Higher Secondary School</h2>
    <button onclick="scrollToFeedback()">SEND US FEEDBACK</button>
</nav>

<!-- HERO SECTION -->
<section class="hero">
    <h1>HELP US IMPROVE</h1>
    <p>Your feedback helps us improve teaching quality.</p>
</section>

<!-- FEEDBACK SECTION (hidden initially) -->
<section id="feedback-section" class="feedback hidden">
    <h2>SEND US FEEDBACK</h2>

    <form id="feedbackForm" method="POST">

    <div class="field">
        <label>Tamil</label>
        <textarea name="Tamil" required></textarea>
    </div>

    <div class="field">
        <label>English</label>
        <textarea name="English" required></textarea>
    </div>

    <div class="field">
        <label>Mathematics</label>
        <textarea name="Mathematics" required></textarea>
    </div>

    <div class="field">
        <label>Science</label>
        <textarea name="Science" required></textarea>
    </div>

    <div class="field">
        <label>Social Science</label>
        <textarea name="Social Science" required></textarea>
    </div>

    <button type="submit">SUBMIT FEEDBACK</button>

</form>
</section>

<!-- THANK YOU MESSAGE -->
<section id="thankyou" class="thankyou hidden">
    <h1>THANK YOU FOR GIVING FEEDBACK</h1>
</section>

<script src="/static/js/student.js"></script>
</body>
</html>
